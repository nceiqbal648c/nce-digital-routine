<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <img src="../images/Head.png" alt="NCE Header" class="header-banner">

    <div class="container">
        <div class="login-box">
            
            <img src="../images/buet-logo.png" class="logo" alt="BUET Logo" style="display:block; margin:0 auto; width:80px; margin-bottom:15px;">
            
            <h1>Faculty Login</h1>
            <p>NCE Digital Routine</p>

            <form>
                <label>Email</label>
                <input type="email" placeholder="Enter Faculty Email" required>

                <label>Password</label>
                <input type="password" placeholder="Enter Password" required>

                <button type="button" onclick="window.location.href='dashboard.html'">
                    Login
                </button>
            </form>

            <button type="button" onclick="window.location.href='../index.html'" style="background:#2c3e50; margin-top:15px; font-size:14px; padding:10px;">
                ⬅️ Back to Main Routine
            </button>
        </div>
    </div>

</body>
</html>
