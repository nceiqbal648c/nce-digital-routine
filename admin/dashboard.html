<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NCE Faculty Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<img src="../images/Head.png" alt="NCE Header" class="header-banner">
<div class="container">

<div class="login-box">

<img src="../images/buet-logo.png" class="logo" alt="BUET Logo">

<h1>Faculty Dashboard</h1>
<p>Department of Nanomaterials and Ceramic Engineering</p>

<div class="menu">
<button>Add Routine</button>
<button>Edit Routine</button>
<button>Delete Routine</button>
<button>Change Day</button>
<button>Change Time</button>
<button>Change Room</button>
<button>Logout</button>
</div>

<hr>

<h2>Routine Management</h2>

<form>

<label>Course Code</label>
<input type="text" placeholder="NCE-101">

<label>Course Title</label>
<input type="text" placeholder="Introduction to NCE">

<label>Faculty Name</label>
<input type="text" placeholder="Dr.">

<label>Day</label>
<select>
<option>Saturday</option>
<option>Sunday</option>
<option>Monday</option>
<option>Tuesday</option>
<option>Wednesday</option>
</select>
<label>Time</label>
<input type="time">

<label>Room</label>
<input type="text" placeholder="B-06">
<label>Remarks</label>
<input type="text" placeholder="Optional">

<button type="submit">
Save Changes
</button
<hr>

<h3>Update Status</h3>

<p>No changes saved yet.</p>
</form>
<label>Semester</label>
<select>
<option>Level-1 Term-1</option>
<option>Level-1 Term-2</option>
<option>Level-2 Term-1</option>
<option>Level-2 Term-2</option>
<option>Level-3 Term-1</option>
<option>Level-3 Term-2</option>
<option>Level-4 Term-1</option>
<option>Level-4 Term-2</option>
</select>

<label>Section</label>
<input type="text" placeholder="A">

<div class="action-buttons">
<button type="submit">Save Routine</button>
<button type="reset">Clear</button>
</div>

</form>

</div>
</div>

</body>
</html>
